# =============================================================================
# JAG FARM — Fleet-Standard Klipper Macros
# Elegoo Centauri Carbon 1 × 6 | COSMOS Firmware
#
# Hardware: CoreXY, 256×270mm bed, load_cell_probe, sensorless X/Y homing
# Included via cosmos.conf → extra_config = jag-farm-macros.cfg
# Push updates to all printers via the JAG Print Farm app → Firmware → Push Config
# =============================================================================

# ── Preheat Profiles ─────────────────────────────────────────────────────────

[gcode_macro JAG_PREHEAT_PLA]
description: Preheat to PLA temps (220°C nozzle / 60°C bed)
gcode:
    M104 S220
    M140 S60
    M117 Preheating PLA...

[gcode_macro JAG_PREHEAT_PETG]
description: Preheat to PETG temps (240°C / 75°C bed)
gcode:
    M104 S240
    M140 S75
    M117 Preheating PETG...

[gcode_macro JAG_PREHEAT_ABS]
description: Preheat to ABS temps (250°C / 100°C bed)
gcode:
    M104 S250
    M140 S100
    M117 Preheating ABS...

[gcode_macro JAG_COOL_DOWN]
description: Turn off all heaters and fan
gcode:
    TURN_OFF_HEATERS
    M107
    M117 Cooling down...

# ── Homing ───────────────────────────────────────────────────────────────────
# Sensorless homing (TMC2209 virtual endstops, SGTHRS baseline=120)
# X homes to max (256.5), Y homes to min (-2.5)

[gcode_macro JAG_HOME]
description: Safe full home with Z lift guard (CoreXY sensorless)
gcode:
    {% if 'z' in printer.toolhead.homed_axes %}
      G91
      G1 Z5 F600
      G90
    {% endif %}
    G28
    M117 Homed

[gcode_macro JAG_HOME_XY]
description: Home X and Y only
gcode:
    G28 X Y
    M117 XY Homed

# ── Filament ─────────────────────────────────────────────────────────────────
# Extruder: 52:10 gear ratio, rotation_distance=28.8, max_extrude_only=120mm

[gcode_macro JAG_LOAD_FILAMENT]
description: Load filament — fast feed then slow purge
variable_load_temp: 220
variable_load_distance: 80
variable_purge_distance: 15
gcode:
    {% set temp = params.TEMP|default(load_temp)|int %}
    M104 S{temp}
    M117 Heating for load...
    M109 S{temp}
    M83
    G1 E{load_distance} F400
    G1 E{purge_distance} F150
    M82
    M117 Filament loaded

[gcode_macro JAG_UNLOAD_FILAMENT]
description: Unload filament — purge tip then retract
variable_unload_temp: 220
variable_unload_distance: 100
gcode:
    {% set temp = params.TEMP|default(unload_temp)|int %}
    M104 S{temp}
    M117 Heating for unload...
    M109 S{temp}
    M83
    G1 E8 F300       ; purge tip
    G1 E-{unload_distance} F800
    M82
    M117 Filament unloaded

# ── Park / End ────────────────────────────────────────────────────────────────
# Bed: X 0→256.5, Y -2.5→270 — park back-left for easy filament access

[gcode_macro JAG_PARK]
description: Park at back-left corner, raise Z
variable_park_x: 5
variable_park_y: 265
variable_park_z_lift: 15
gcode:
    {% set z_max = printer.toolhead.axis_maximum.z %}
    {% set z_cur = printer.toolhead.position.z %}
    {% set z_safe = [z_cur + park_z_lift, z_max - 2]|min %}
    G90
    G1 Z{z_safe} F600
    G1 X{park_x} Y{park_y} F9000
    M117 Parked

[gcode_macro JAG_END_PRINT]
description: Standard end-of-print for all Jag Farm printers
gcode:
    M400
    G92 E0
    G1 E-3 F3600     ; retract 3mm
    TURN_OFF_HEATERS
    JAG_PARK
    M107
    M84
    M117 Print complete!

# ── Calibration ───────────────────────────────────────────────────────────────
# Bed mesh: 11×11 probe, mesh_min=20,20  mesh_max=246,246 (load_cell_probe)

[gcode_macro JAG_FULL_CALIBRATION]
description: Full home + bed mesh calibration
gcode:
    JAG_HOME
    M117 Probing bed mesh (11x11)...
    BED_MESH_CALIBRATE
    M117 Done — run SAVE_CONFIG to persist

[gcode_macro JAG_SCREWS_ADJUST]
description: Tram bed screws (CW-M3, 4 corners)
gcode:
    JAG_HOME
    SCREWS_TILT_ADJUST
    M117 Adjust screws per display

[gcode_macro JAG_PID_TUNE_NOZZLE]
description: PID tune extruder (default 220°C)
gcode:
    {% set temp = params.TEMP|default(220)|int %}
    PID_CALIBRATE HEATER=extruder TARGET={temp}
    M117 Nozzle PID done — SAVE_CONFIG

[gcode_macro JAG_PID_TUNE_BED]
description: PID tune heated bed (default 60°C)
gcode:
    {% set temp = params.TEMP|default(60)|int %}
    PID_CALIBRATE HEATER=heater_bed TARGET={temp}
    M117 Bed PID done — SAVE_CONFIG

[gcode_macro JAG_INPUT_SHAPER]
description: Run resonance test and auto-calibrate input shaper
gcode:
    JAG_HOME
    SHAPER_CALIBRATE
    M117 Shaper calibrated — SAVE_CONFIG

# ── Sensorless Homing Tuning ──────────────────────────────────────────────────
# Baseline SGTHRS = 120 for X and Y — adjust per printer if homing is unreliable

[gcode_macro JAG_TUNE_SGTHRS]
description: Set sensorless homing sensitivity (default 120). Lower = more sensitive.
gcode:
    {% set val = params.VALUE|default(120)|int %}
    SET_TMC_FIELD STEPPER=stepper_x FIELD=SGTHRS VALUE={val}
    SET_TMC_FIELD STEPPER=stepper_y FIELD=SGTHRS VALUE={val}
    { action_respond_info("SGTHRS set to %d for X and Y" % val) }

# ── Status ────────────────────────────────────────────────────────────────────

[gcode_macro JAG_STATUS]
description: Print current printer status to console
gcode:
    {% set p = printer %}
    {% set th = p.toolhead %}
    { action_respond_info(
        "=== JAG FARM STATUS ===\n"
        "Position: X%.1f Y%.1f Z%.1f\n" % (th.position.x, th.position.y, th.position.z) ~
        "Homed:    %s\n" % th.homed_axes ~
        "Nozzle:   %.1f°C / %.1f°C target\n" % (p.extruder.temperature, p.extruder.target) ~
        "Bed:      %.1f°C / %.1f°C target\n" % (p.heater_bed.temperature, p.heater_bed.target) ~
        "Fan:      %d%%\n" % (p.fan.speed * 100) ~
        "Speed:    %d%%  Flow: %d%%\n" % (p.gcode_move.speed_factor * 100, p.gcode_move.extrude_factor * 100) ~
        "PA:       %.4f\n" % p.extruder.pressure_advance
    ) }

# ── Preheat Profiles ─────────────────────────────────────────────────────────

[gcode_macro JAG_PREHEAT_PLA]
description: Preheat to PLA temps (220°C / 60°C bed)
gcode:
    M104 S220          ; nozzle target
    M140 S60           ; bed target
    M117 Preheating PLA...

[gcode_macro JAG_PREHEAT_PETG]
description: Preheat to PETG temps (240°C / 75°C bed)
gcode:
    M104 S240
    M140 S75
    M117 Preheating PETG...

[gcode_macro JAG_PREHEAT_ABS]
description: Preheat to ABS temps (250°C / 100°C bed)
gcode:
    M104 S250
    M140 S100
    M117 Preheating ABS...

[gcode_macro JAG_COOL_DOWN]
description: Turn off all heaters and fan
gcode:
    TURN_OFF_HEATERS
    M107
    M117 Cooling down...

# ── Homing ───────────────────────────────────────────────────────────────────

[gcode_macro JAG_HOME]
description: Safe full home — lifts Z first if not homed
gcode:
    {% if not 'xyz' in printer.toolhead.homed_axes %}
        G28
    {% else %}
        G91
        G1 Z5 F600
        G90
        G28
    {% endif %}
    M117 Homed

[gcode_macro JAG_HOME_XY]
description: Home X and Y only (skip Z probe)
gcode:
    G28 X Y
    M117 XY Homed

# ── Filament ─────────────────────────────────────────────────────────────────

[gcode_macro JAG_LOAD_FILAMENT]
description: Load filament — purge 60mm at 200°C
variable_load_temp: 220
variable_load_distance: 60
gcode:
    {% set temp = params.TEMP|default(load_temp)|int %}
    M104 S{temp}
    M117 Heating for load...
    M109 S{temp}
    M83
    G1 E{load_distance} F300
    G1 E10 F150
    M82
    M117 Filament loaded

[gcode_macro JAG_UNLOAD_FILAMENT]
description: Unload filament — retract 80mm at 200°C
variable_unload_temp: 220
variable_unload_distance: 80
gcode:
    {% set temp = params.TEMP|default(unload_temp)|int %}
    M104 S{temp}
    M117 Heating for unload...
    M109 S{temp}
    M83
    G1 E10 F300    ; purge a bit first
    G1 E-{unload_distance} F600
    M82
    M117 Filament unloaded

# ── Park / End ────────────────────────────────────────────────────────────────

[gcode_macro JAG_PARK]
description: Park toolhead at safe position (back-left, Z raised)
variable_park_x: 5
variable_park_y: 195
variable_park_z_lift: 10
gcode:
    {% set z_max = printer.toolhead.axis_maximum.z %}
    {% set z_cur = printer.toolhead.position.z %}
    {% set z_lift = [z_cur + park_z_lift, z_max]|min %}
    G90
    G1 Z{z_lift} F600
    G1 X{park_x} Y{park_y} F6000
    M117 Parked

[gcode_macro JAG_END_PRINT]
description: Standard end-of-print routine for all Jag Farm printers
gcode:
    M400                        ; wait for buffer to clear
    G92 E0                      ; zero extruder
    G1 E-2 F3600                ; retract 2mm
    TURN_OFF_HEATERS
    JAG_PARK
    M107                        ; fan off
    M84                         ; motors off
    M117 Print complete!

# ── Calibration ───────────────────────────────────────────────────────────────

[gcode_macro JAG_FULL_CALIBRATION]
description: Run full bed mesh + Z offset calibration
gcode:
    JAG_HOME
    M117 Running bed mesh...
    BED_MESH_CALIBRATE
    M117 Calibration complete — run SAVE_CONFIG to persist

[gcode_macro JAG_PID_TUNE_NOZZLE]
description: PID tune extruder at 220C
gcode:
    {% set temp = params.TEMP|default(220)|int %}
    PID_CALIBRATE HEATER=extruder TARGET={temp}
    M117 PID tune complete — run SAVE_CONFIG

[gcode_macro JAG_PID_TUNE_BED]
description: PID tune heated bed at 60C
gcode:
    {% set temp = params.TEMP|default(60)|int %}
    PID_CALIBRATE HEATER=heater_bed TARGET={temp}
    M117 Bed PID tune complete — run SAVE_CONFIG

# ── Status ────────────────────────────────────────────────────────────────────

[gcode_macro JAG_STATUS]
description: Print current printer status to console
gcode:
    {% set p = printer %}
    {% set th = p.toolhead %}
    { action_respond_info(
        "=== JAG FARM STATUS ===\n"
        "Position: X%.1f Y%.1f Z%.1f\n" % (th.position.x, th.position.y, th.position.z) ~
        "Homed: %s\n" % th.homed_axes ~
        "Nozzle: %.1f°C → %.1f°C\n" % (p.extruder.temperature, p.extruder.target) ~
        "Bed:    %.1f°C → %.1f°C\n" % (p.heater_bed.temperature, p.heater_bed.target) ~
        "Fan:    %d%%\n" % (p.fan.speed * 100) ~
        "Speed:  %d%%  Flow: %d%%\n" % (p.gcode_move.speed_factor * 100, p.gcode_move.extrude_factor * 100)
    ) }
