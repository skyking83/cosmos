name: Build & Release COSMOS Firmware

on:
  # Manual trigger — always explicit, never accidental OTA pushes
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. jag-1.0.0)'
        required: true
        default: 'jag-0.0.1'
      prerelease:
        description: 'Mark as pre-release?'
        type: boolean
        default: true

  # Also trigger on version tags: git tag jag-1.0.0 && git push --tags
  push:
    tags:
      - 'jag-*'

jobs:
  build:
    name: Yocto Build
    # Use self-hosted runner if available, fall back to large GitHub runner
    # For self-hosted: label your Linux build machine with 'yocto' in GitHub Actions settings
    runs-on: ${{ vars.YOCTO_RUNNER || 'ubuntu-22.04' }}
    timeout-minutes: 480  # 8 hours max

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install Yocto dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gawk wget git diffstat unzip texinfo gcc build-essential \
            chrpath socat cpio python3 python3-pip python3-pexpect \
            xz-utils debianutils iputils-ping python3-git python3-jinja2 \
            libegl1-mesa libsdl1.2-dev pylint xterm python3-subunit \
            mesa-common-dev zstd liblz4-tool file locales bmap-tools sunxi-tools
          sudo locale-gen en_US.UTF-8

      - name: Restore sstate-cache
        uses: actions/cache/restore@v4
        id: sstate-cache
        with:
          path: build/sstate-cache
          key: sstate-${{ runner.os }}-${{ hashFiles('meta-opencentauri/**') }}
          restore-keys: |
            sstate-${{ runner.os }}-

      - name: Restore downloads cache
        uses: actions/cache/restore@v4
        with:
          path: build/downloads
          key: downloads-${{ runner.os }}-${{ hashFiles('.gitmodules') }}
          restore-keys: |
            downloads-${{ runner.os }}-

      - name: Initialize Yocto build environment
        run: |
          source poky/oe-init-build-env build
          # Inject JAG FARM version into the build
          echo "DISTRO_VERSION = \"${{ github.event.inputs.version || github.ref_name }}\"" >> conf/local.conf
          echo "Build environment initialized"

      - name: Build firmware image
        run: |
          source poky/oe-init-build-env build
          bitbake opencentauri-image

      - name: Save sstate-cache (speeds up future builds)
        uses: actions/cache/save@v4
        if: always()
        with:
          path: build/sstate-cache
          key: sstate-${{ runner.os }}-${{ hashFiles('meta-opencentauri/**') }}

      - name: Save downloads cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: build/downloads
          key: downloads-${{ runner.os }}-${{ hashFiles('.gitmodules') }}

      - name: Locate built .swu
        id: swu
        run: |
          SWU=$(find build/tmp/deploy/images -name "*.swu" | head -1)
          echo "path=$SWU" >> $GITHUB_OUTPUT
          echo "size=$(stat -c%s $SWU)" >> $GITHUB_OUTPUT
          echo "Built SWU: $SWU ($(stat -c%s $SWU) bytes)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: "JAG Farm COSMOS ${{ github.event.inputs.version || github.ref_name }}"
          prerelease: ${{ github.event.inputs.prerelease || false }}
          body: |
            ## JAG Farm COSMOS Firmware

            Built from `skyking83/cosmos` fork of [OpenCentauri/cosmos](https://github.com/OpenCentauri/cosmos).

            ### Fleet Customizations
            - JAG Farm fleet macros (preheat, load/unload, park, calibration, status)
            - Updated `cosmos.conf` with fleet identity
            - Elegoo Centauri Carbon 1 × 6 tuned defaults

            ### Install
            Use the **JAG Print Farm app** → Firmware → Update All, or:
            ```
            # Via Moonraker API (single printer)
            curl -X POST http://<printer-ip>/upload -F swu=@update.swu
            ```
          files: ${{ steps.swu.outputs.path }}
          token: ${{ secrets.GITHUB_TOKEN }}
